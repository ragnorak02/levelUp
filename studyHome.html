<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <title>Learn</title>
    <style>
        body {
            margin-top: 10px;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #9AD0C2;
            flex-direction: column;
        }

        .header {
            text-align: center;
            background-color: #2D9596;
            color: white;
            padding: 10px 10px;
            border-radius: 10px;
            border: 2px solid black;
            font-size: 24px;
            width: 90%;
            margin: 5px auto;
        }

        .nav-menu {
            text-align: center;
            margin-bottom: 20px;
        }

        .nav-menu button {
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            height: 60px;
            background-color: #387ADF;
            color: white;
        }

        .nav-menu button:hover {
            background-color: #45a049;
        }

        .library-div,
        .learn-div {
            text-align: center;
            font-size: 28px;
            padding: 80px;
            background-color: #9BB0C1;
            cursor: pointer;
            border: 2px solid black;
            margin: 15px 0px 15px 0px;
        }

        .home-btn {
            margin-bottom: 10px;
        }

        .progress-bar-container {
            width: 80%;
            margin: 0 auto;
        }

        .progress-bar {
            background-color: #F8F3D4;
            border-radius: 5px;
            padding: 3px;
            position: relative;
            /* Added for positioning */
        }

        .progress-bar-inner {
            background-color: #4CAF50;
            height: 20px;
            border-radius: 5px;
            width: 50%;
            /* Change the width dynamically based on the number of cards stored in local storage */
            transition: width 0.5s ease-in-out;
            position: relative;
        }

        .progress-count {
            text-align: center;
            margin-top: 5px;
        }

        .progress-text {
            color: black;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .action-row {
            margin-top: 20px;
        }

        .header-categories {
            text-align: center;
            background-color: #E9B824;
            color: white;
            padding: 10px 10px;
            border-radius: 10px;
            border: 2px solid black;
            font-size: 18px;
            width: 90%;
            margin: 5px auto;
        }

        .button-row-container {
            max-width: 350px;
            margin-left: 5px;
            padding-left: 5px;
            overflow-x: auto;
            overflow-y: hidden;
            white-space: nowrap;
            /* Prevent buttons from wrapping */
        }

        #button-row {
            display: inline-block;
            /* Ensure buttons are displayed in a single line */
        }

        .category-button {
            margin: 5px 5px;
            padding: 35px;
            font-size: 16px;
            background-color: #F1FADA;
            /* Red */
            color: ba;
            /* White text */
            border: 2px solid black;
            /* Red border */
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
            position: relative;
        }

        .category-button:hover {
            background-color: #45a049;
            /* Green on hover */
            border-color: #45a049;
            /* Green border on hover */
            color: #FFFFFF;
            /* White text on hover */
        }

        #categoryDropdown {
            display: none;
        }

        .button-div {
            display: inline-block;
            position: relative;
            margin-right: 2px;
            margin-bottom: 2px;
        }

        .category-info {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: auto;
            padding: 2px;
        }

        .row-header {
            font-size: 18px;
            text-align: left;
            padding-left: 20px;
        }

        .row-header-info {
            font-size: 14px;
            text-align: left;
            padding-left: 20px;
            margin-top: 5px;
        }
    </style>
</head>

<body>
    <div class="header">Study</div>
    <div class="nav-menu">
        <button onclick="window.location.href='main.html'"><i class="fa fa-home"></i></button>
        <button onclick="window.location.href = 'studyHome.html';">Study</button>
        <button onclick="window.location.href = 'createCard.html';">Create New Cards</button>
        <button onclick="window.location.href = 'viewCards.html';">View All Cards</button>
    </div>
    <div class="progress-bar-container">
        <div class="progress-bar">
            <div class="progress-bar-inner" id="progressBar">
                <div class="progress-text" id="progressText"></div>
            </div>
        </div>
        <div class="progress-count" id="progressCount">0 cards stored</div>
    </div>
    <div class="action-row">
        <div class="row-header">Categories</div>
        <div class="row-header-info" id="categoryInfo">0 words in 0 categories</div>
        <div class="button-row-container">
            <!-- Category buttons will be dynamically added here -->
            <div id="button-row">
                <!-- Repeat for other category buttons -->
            </div>
        </div>
    </div>


    <script>
        // Retrieve data from local storage
        let data = JSON.parse(localStorage.getItem('levelupFlashData'))?.flashcards || [];
        var cardCount = data.length;
        var memorizedCount = data.filter(item => item.memorized === true).length;

        // Update the progress bar width and count
        var progressBar = document.getElementById('progressBar');
            var progressCount = document.getElementById('progressCount');
            var progressText = document.getElementById('progressText');

            var percentage = (memorizedCount / cardCount * 100).toFixed(2); // Calculate percentage with 2 decimal places
            progressBar.style.width = percentage + '%';
            progressCount.textContent = memorizedCount + ' of ' + cardCount + " mastered";
            progressText.textContent = percentage + '%'; // Display percentage inside progress bar

            // Get unique sorted categories
            const uniqueCategories = [...new Set(data.map(item => item.category))].sort();

            const buttonRowContainer = document.querySelector('.button-row-container');

            // Populate the button row with buttons for each category
            uniqueCategories.forEach(category => {
                const categoryCards = data.filter(item => item.category === category).length;

                const buttonDiv = document.createElement('div'); // Create a container for the button and count
                buttonDiv.className = 'button-div';

                const button = document.createElement('button');
                button.textContent = category;
                button.className = 'category-button';
                button.addEventListener('click', () => navigateToLearnPage(category));
                buttonDiv.appendChild(button);

                // Create a div for the category count
                const categoryInfo = document.createElement('div');
                categoryInfo.className = 'category-info';
                categoryInfo.textContent = `(${categoryCards})`;
                buttonDiv.appendChild(categoryInfo);

                buttonRowContainer.appendChild(buttonDiv);
            });

            // Update the category info
            const categoryInfo = document.getElementById('categoryInfo');
            categoryInfo.textContent = `${cardCount} words in ${uniqueCategories.length} categories`;

            // Function to navigate to learn page with the selected category
            function navigateToLearnPage(selectedCategory) {
                window.location.href = 'learn.html?category=' + selectedCategory;
            }
        </script>
    </body>
    
    </html>
